<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>ASCII</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: #000;
    width: 100%; height: 100%;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }
  #asciiOut {
    font-family: monospace;
    font-size: 9px;
    line-height: 1.15;
    letter-spacing: 0.08em;
    white-space: pre;
    color: #fff;
    display: block;
  }
</style>
</head>
<body>

<pre id="asciiOut"></pre>
<video id="vid" style="display:none" crossorigin="anonymous" loop></video>
<canvas id="cnv" style="display:none"></canvas>

<script>
const CHARS = ' .\'`^",:;Il!i><~+_-?][}{1)(|/tfjrxnuvczXYUJCLQ0OZmwqpdbkhao*#MW&8%B@$';
const vid = document.getElementById('vid');
const cnv = document.getElementById('cnv');
const out = document.getElementById('asciiOut');
const ctx = cnv.getContext('2d', { willReadFrequently: true });
let animId = null;

function startRender() {
  cancelAnimationFrame(animId);
  function loop() {
    if (!vid.paused && !vid.ended) {
      const cols   = Math.floor(window.innerWidth / 5.5);
      const aspect = vid.videoHeight / vid.videoWidth;
      const rows   = Math.floor(cols * aspect * 0.42);
      cnv.width = cols; cnv.height = rows;
      ctx.drawImage(vid, 0, 0, cols, rows);
      const data = ctx.getImageData(0, 0, cols, rows).data;
      let txt = '';
      for (let y = 0; y < rows; y++) {
        for (let x = 0; x < cols; x++) {
          const i  = (y * cols + x) * 4;
          const br = (0.299*data[i] + 0.587*data[i+1] + 0.114*data[i+2]) / 255;
          txt += CHARS[Math.floor(br * (CHARS.length - 1))] || ' ';
        }
        txt += '\n';
      }
      out.textContent = txt;
    }
    animId = requestAnimationFrame(loop);
  }
  loop();
}

document.addEventListener('click', () => vid.paused ? vid.play() : vid.pause());

vid.src = 'https://file.garden/abFLf7yYMGYIwx9m/bad-apple.mp4';
vid.volume = 0.03;  
vid.load();
vid.oncanplay = () => { vid.play(); startRender(); };
</script>

</body>
</html>
